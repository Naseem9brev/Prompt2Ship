services:
  - type: web
    runtime: python
    name: prompt2ship-api
    rootDir: backend
    plan: starter
    buildCommand: pip install .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://prompt2ship.vercel.app
      - key: CORS_ORIGINS
        value: https://prompt2ship.vercel.app
      - key: GITHUB_SCAN_YEAR
        value: "2026"
      - key: SCAN_DELTA_DAYS
        value: "3"
      - key: REFRESH_CRON_SECRET
        generateValue: true
      - key: LOG_LEVEL
        value: INFO

  - type: cron
    runtime: python
    name: prompt2ship-refresh-delta
    rootDir: backend
    plan: starter
    schedule: "17 3 * * *"
    buildCommand: pip install .
    startCommand: python scripts/render_refresh_delta.py
    envVars:
      - key: REFRESH_CRON_URL
        value: https://prompt2ship-api.onrender.com/api/internal/refresh-delta
      - key: REFRESH_CRON_SECRET
        fromService:
          type: web
          name: prompt2ship-api
          envVarKey: REFRESH_CRON_SECRET
      - key: SCAN_DELTA_DAYS
        value: "3"
